name: .NET CI

on:
  push:
    branches: [ "main", "phase-06-production-readiness" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MiniLedger.sln

      - name: Build
        run: dotnet build MiniLedger.sln --no-restore

      - name: Test
        run: dotnet test MiniLedger.sln --no-build
